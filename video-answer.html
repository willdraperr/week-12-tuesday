<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>JavaScript Video Controls</title>
	<link rel="stylesheet" type="text/css" href="css/video.css">
</head>
<body onload = "welcome()"> 
<main>
	<h1>JavaScript Video Controls</h1>
	<div class = "options">
		<button  id = "play" onclick = "play()">Play Video</button>
		<button  id = "pause" onclick = "pause()">Pause Video</button>
		<button  id = "slower" onclick = "slower()">Slow Down</button>
		<button  id = "faster" onclick = "faster()">Speed Up</button>
		<button  id = "skip" onclick = "skip()">Skip Ahead</button>
	</div>

	<figure>

		<video class = "video" 
			width="640" 
			height="360" 
			id="player1" 
			preload="none"
			src="assets/marchingband.mov">
			  
		    <track src="captions_en.vtt" kind="captions" srclang="en" label="english_captions">	
		  		Your browser does not support HTML5 video.
		</video>
		<figcaption>[The Michigan Marching Band]</figcaption>
		</figure> 
	<button id="muteButton" onclick = "toggleMute()">Mute</button><br>

	<label for="slider">Volume</label>: 0 
    <input type="range" id="slider" min="0" max="100" value="100" step="10" onchange = adjustVolume()> 100%<br>
	<div>Volume is: <span id = "volumeDisplay"> </span><br><br></div>

	<button id = "vintage" onclick = "setStyle()">Old School Version</button>

	<p>Video courtesy of Allison Sweet.</p>

    <script src = "js/video.js"></script>
</main>
</body> 
</html>
